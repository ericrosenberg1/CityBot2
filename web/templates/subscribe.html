{% extends "base_public.html" %}
{% set active_page = "subscribe" %}

{% block title %}Subscribe{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Email Subscriptions</h1>
    <div class="subtitle">Get {{ city.get('name', 'CityBot2') }} updates delivered to your inbox</div>
</div>

<div class="login-container">
    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <div class="card-header">
            <h3>Subscribe to Updates</h3>
        </div>

        <form method="post" action="/subscribe">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label>Notification Preferences</label>
                <div style="display:flex; flex-direction:column; gap:0.5rem; margin-top:0.25rem;">
                    <label style="display:flex; align-items:center; gap:0.5rem; font-size:0.9rem; color:var(--text); cursor:pointer;">
                        <input type="checkbox" name="weather" value="1" checked> Weather Updates
                    </label>
                    <label style="display:flex; align-items:center; gap:0.5rem; font-size:0.9rem; color:var(--text); cursor:pointer;">
                        <input type="checkbox" name="earthquakes" value="1" checked> Earthquake Alerts
                    </label>
                    <label style="display:flex; align-items:center; gap:0.5rem; font-size:0.9rem; color:var(--text); cursor:pointer;">
                        <input type="checkbox" name="news" value="1" checked> Local News
                    </label>
                    <label style="display:flex; align-items:center; gap:0.5rem; font-size:0.9rem; color:var(--text); cursor:pointer;">
                        <input type="checkbox" name="announcements" value="1" checked> Announcements
                    </label>
                </div>
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-primary" style="width:100%;">Subscribe</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
